<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
</head>
<body>
    <form action="">
        <h1>Payment Form</h1>
        <h2>Contact Information</h2>
        <p>Name: *<input type="text" name="Name" id="name" required></p>
       <fieldset>
        <legend>Gender</legend>
         <p>Male: *<input type="radio" name="Gender" id="gender" required></p>
        <p>Female: *<input type="radio" name="Gender" id="gender" required></p>
        <p>Other: *<input type="radio" name="Gender" id="gender" required></p>
    </fieldset>
    <p>Address: <textarea name="Address" id="address" cols="50" rows="8"></textarea></p>
    <p>Email * <input type="email" name="Email" id="email" required></p>
    <p>Pincode: * <input type="number" name="Pincode" id="pincode" required></p>
    <hr>
    <h2>Payment Information</h2>
    <p>Card Type:  <select name="Card Type" id="card_type">
        <option value="">--Select a Card Type--</option>
        <option value="Visa">Visa</option>
        <option value="Rupay">Rupay</option>
        <option value="Master Card">Master Card</option>
    </select>
    </p>
    <p>Card Number : <input type="number" name="Card Number" id="card-number"></p>
    <p>Expiration Date: <input type="date" name="Expiration Date" id="expiration-date"></p>
    <p>CVV: *<input type="password" name="CVV" id="cvv" required></p>
    <input type="submit" name="Pay Now" id="pay_now" value="Pay Now">
    </form>
</body>
</html>
